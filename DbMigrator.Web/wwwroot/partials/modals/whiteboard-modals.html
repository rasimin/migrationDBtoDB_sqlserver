<!-- ============================================================================
     MODAL: CREATE NEW WHITEBOARD DRAWING
     ============================================================================ -->
<div class="modal-overlay" id="create-whiteboard-modal">
    <div class="modal-content" style="max-width: 450px; border-color: var(--border-glass);">
        <div class="modal-header">
            <div>
                <h3>Create new drawing</h3>
                <p style="font-size: 0.8rem; color: var(--text-muted); margin-top: 0.25rem;">Tambahkan sketsa coretan baru untuk mendokumentasikan skema atau alur data.</p>
            </div>
            <button class="close-btn" onclick="closeNewWhiteboardModal()">&times;</button>
        </div>
        <div class="modal-body" style="padding: 1.25rem 1.75rem;">
            <div class="form-group" style="margin-bottom: 1.25rem;">
                <label for="whiteboard-new-name" style="font-size: 0.82rem; font-weight: 600; color: #ffffff; display: block; margin-bottom: 0.4rem;">Alias Name</label>
                <input type="text" id="whiteboard-new-name" class="form-control" placeholder="Contoh: mature settle" style="font-size: 0.85rem; height: 38px; border-radius: 8px; background: rgba(255,255,255,0.03); border: 1px solid var(--border-flat); width: 100%; color: #ffffff; padding: 0 0.75rem;">
            </div>
            <div class="form-group" style="margin-bottom: 1.25rem;">
                <label for="whiteboard-new-tag" style="font-size: 0.82rem; font-weight: 600; color: #ffffff; display: block; margin-bottom: 0.4rem;">Tag</label>
                <input type="text" id="whiteboard-new-tag" class="form-control" placeholder="Contoh: Database, Flowchart, Architecture (atau kosongkan)" style="font-size: 0.85rem; height: 38px; border-radius: 8px; background: rgba(255,255,255,0.03); border: 1px solid var(--border-flat); width: 100%; color: #ffffff; padding: 0 0.75rem;" list="whiteboard-tag-suggestions">
                <datalist id="whiteboard-tag-suggestions">
                    <option value="Database">
                    <option value="Flowchart">
                    <option value="Architecture">
                    <option value="Kafka Config">
                    <option value="Bug Notes">
                </datalist>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="closeNewWhiteboardModal()" style="width: auto;">Batal</button>
            <button class="btn btn-primary" onclick="createNewWhiteboardExec()" style="width: auto; background: #ffffff; color: #0d0f14; border-color: #ffffff; font-weight: 600;">
                Save changes
            </button>
        </div>
    </div>
</div>
