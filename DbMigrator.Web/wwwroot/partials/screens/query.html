                                        <i class="fa-solid fa-file-csv" style="font-size: 0.75rem;"></i> Export CSV
                                    </button>
                                    <span id="query-rows-count" style="color: var(--text-muted);"></span>
                                </div>
                            </div>

                            <!-- Results / Messages Tab Switcher (like SSMS) -->
                            <div id="query-result-tabs" style="display: flex; gap: 0; border-bottom: 1px solid var(--border-flat); margin-bottom: 0;">
                                <button id="query-tab-results" onclick="switchQueryResultsTab('results')"
                                    style="padding: 0.4rem 1.1rem; font-size: 0.8rem; font-weight: 600; border: none; background: rgba(45, 212, 191, 0.12); color: var(--accent-teal); border-top: 2px solid var(--accent-teal); border-bottom: 2px solid transparent; cursor: pointer; display: inline-flex; align-items: center; gap: 0.35rem; transition: all 0.15s ease; margin-bottom: -1px;">
                                    <i class="fa-solid fa-table" style="font-size: 0.75rem;"></i> Results
                                    <span id="query-tab-results-count" style="background: rgba(45,212,191,0.2); color: var(--accent-teal); border-radius: 10px; padding: 0 5px; font-size: 0.68rem; font-weight: 700; display: none;"></span>
                                </button>
                                <button id="query-tab-messages" onclick="switchQueryResultsTab('messages')"
                                    style="padding: 0.4rem 1.1rem; font-size: 0.8rem; font-weight: 600; border: none; background: transparent; color: var(--text-muted); border-top: 2px solid transparent; border-bottom: 2px solid transparent; cursor: pointer; display: inline-flex; align-items: center; gap: 0.35rem; transition: all 0.15s ease; margin-bottom: -1px;">
                                    <i class="fa-solid fa-message" style="font-size: 0.75rem;"></i> Messages
                                    <span id="query-tab-messages-badge" style="background: rgba(251,146,60,0.2); color: #fb923c; border-radius: 10px; padding: 0 5px; font-size: 0.68rem; font-weight: 700; display: none;"></span>
                                </button>
                            </div>

                            <!-- Results Panel -->
                            <div id="query-results-container" style="margin-top: 0;">
                                <!-- Dynamic tabs and grid tables will be populated here -->
                            </div>

                            <!-- Messages Panel -->
                            <div id="query-messages-container" style="display: none; margin-top: 0; background: #07090d; border: 1px solid var(--border-flat); border-top: none; border-radius: 0 0 8px 8px; padding: 0.75rem 1rem; min-height: 80px; max-height: 320px; overflow-y: auto; font-family: Consolas, Monaco, monospace; font-size: 0.82rem; line-height: 1.7; color: #e2e8f0;">
                                <div id="query-messages-content" style="white-space: pre-wrap; word-break: break-word;"></div>
                            </div>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>
