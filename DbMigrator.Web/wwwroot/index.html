<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DbMigrator.NET - Premium Control Panel</title>
    <meta name="description" content="Dynamic Metadata-Driven SQL Server Database Migration Tool — kelola migrasi data dan objek DDL antar database secara visual.">
    <link rel="stylesheet" href="style.css?v=3.15">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
</head>
<body>

<div id="app-loading" class="app-loading" role="status" aria-live="polite">
    <i class="fa-solid fa-circle-notch fa-spin"></i>
    <span>Memuat antarmuka...</span>
</div>

<div class="app-container">
    <div class="top-nav-wrapper">
        <nav class="top-nav">
            <button class="nav-item active" id="main-nav-migration" onclick="switchMainTab('migration')">
                <i class="fa-solid fa-route"></i> Migration
            </button>
            <button class="nav-item" id="main-nav-query" onclick="switchMainTab('query')">
                <i class="fa-solid fa-terminal"></i> Query Console
            </button>
            <button class="nav-item" id="main-nav-beautifier" onclick="switchMainTab('beautifier')">
                <i class="fa-solid fa-wand-magic-sparkles"></i> Beautifier
            </button>
            <button class="nav-item" id="main-nav-whiteboard" onclick="switchMainTab('whiteboard')">
                <i class="fa-solid fa-pen-ruler"></i> Whiteboard
            </button>
            <button class="nav-item" id="main-nav-ssrs" onclick="switchMainTab('ssrs')">
                <i class="fa-solid fa-folder-open"></i> SSRS Explorer
            </button>
        </nav>
        <button class="top-nav-toggle" id="top-nav-toggle-btn" onclick="toggleTopNav()" title="Sembunyikan Menu">
            <i class="fa-solid fa-chevron-up"></i>
        </button>
    </div>

    <div id="app-screens-root"></div>
</div>

<div id="app-modals-root"></div>

<!-- System dialog (alert / confirm / prompt) -->
<div id="ui-dialog-overlay" class="ui-dialog-overlay" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="ui-dialog-title">
    <div id="ui-dialog-card" class="ui-dialog-card ui-dialog-info">
        <div class="ui-dialog-body">
            <div id="ui-dialog-icon" class="ui-dialog-icon-wrap ui-dialog-icon-info" aria-hidden="true">
                <i id="ui-dialog-icon-i" class="fa-solid fa-circle-info"></i>
            </div>
            <div class="ui-dialog-content">
                <h3 id="ui-dialog-title" class="ui-dialog-title">Informasi</h3>
                <div id="ui-dialog-message" class="ui-dialog-message"></div>
                <div id="ui-dialog-input-wrap" class="ui-dialog-input-wrap" style="display: none;">
                    <input type="text" id="ui-dialog-input" class="ui-dialog-input form-control" autocomplete="off">
                    <small id="ui-dialog-input-hint" class="ui-dialog-input-hint" style="display: none;"></small>
                </div>
            </div>
        </div>
        <div id="ui-dialog-footer" class="ui-dialog-footer"></div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/6.0.1/signalr.min.js"></script>
<script src="lib/sql-formatter.min.js"></script>
<script src="lib/monaco-editor/min/vs/loader.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-sql.min.js"></script>

<script>
    window._monacoDefine = window.define;
    window.define = undefined;
</script>

<script src="lib/excalidraw/react.production.min.js"></script>
<script src="lib/excalidraw/react-dom.production.min.js"></script>
<script>
    window.EXCALIDRAW_ASSET_PATH = "/lib/excalidraw/";
</script>
<script src="lib/excalidraw/excalidraw.production.min.js"></script>

<script>
    window.define = window._monacoDefine;
</script>

<script src="layout-loader.js?v=1.0"></script>
<script src="ui-dialog.js?v=1.0"></script>
<script src="app.js?v=3.15"></script>
<script src="migration.js?v=1.0"></script>
<script src="query.js?v=1.5"></script>
<script src="query-execution.js?v=1.0"></script>
<script src="query-schema.js?v=1.0"></script>
<script src="query-modals.js?v=1.0"></script>
<script src="beautifier.js?v=1.0"></script>
<script src="whiteboard.js?v=1.0"></script>
<script src="ssrs.js?v=1.0"></script>

</body>
</html>
