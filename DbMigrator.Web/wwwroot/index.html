<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DbMigrator.NET - Premium Control Panel</title>
    <meta name="description" content="Dynamic Metadata-Driven SQL Server Database Migration Tool — kelola migrasi data dan objek DDL antar database secara visual.">
    <link rel="stylesheet" href="style.css?v=3.12">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
</head>
<body>

<div id="app-loading" class="app-loading" role="status" aria-live="polite">
    <i class="fa-solid fa-circle-notch fa-spin"></i>
    <span>Memuat antarmuka...</span>
</div>

<div class="app-container">
    <nav class="top-nav">
        <button class="nav-item active" id="main-nav-migration" onclick="switchMainTab('migration')">
            <i class="fa-solid fa-route"></i> Migration
        </button>
        <button class="nav-item" id="main-nav-query" onclick="switchMainTab('query')">
            <i class="fa-solid fa-terminal"></i> Query Console
        </button>
        <button class="nav-item" id="main-nav-beautifier" onclick="switchMainTab('beautifier')">
            <i class="fa-solid fa-wand-magic-sparkles"></i> Beautifier
        </button>
        <button class="nav-item" id="main-nav-whiteboard" onclick="switchMainTab('whiteboard')">
            <i class="fa-solid fa-pen-ruler"></i> Whiteboard
        </button>
    </nav>

    <div id="app-screens-root"></div>
</div>

<div id="app-modals-root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/6.0.1/signalr.min.js"></script>
<script src="lib/sql-formatter.min.js"></script>
<script src="lib/monaco-editor/min/vs/loader.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-sql.min.js"></script>

<script>
    window._monacoDefine = window.define;
    window.define = undefined;
</script>

<script src="lib/excalidraw/react.production.min.js"></script>
<script src="lib/excalidraw/react-dom.production.min.js"></script>
<script>
    window.EXCALIDRAW_ASSET_PATH = "/lib/excalidraw/";
</script>
<script src="lib/excalidraw/excalidraw.production.min.js"></script>

<script>
    window.define = window._monacoDefine;
</script>

<script src="layout-loader.js?v=1.0"></script>
<script src="app.js?v=3.12"></script>

</body>
</html>
